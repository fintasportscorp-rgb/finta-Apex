kind = "web"
previewPath = "/"
title = "Apex — Analyse de geste sportif"
version = "1.0.0"
id = "artifacts/apex"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23095

[services.development]
run = "pnpm --filter @workspace/apex run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/apex", "run", "build" ]
publicDir = "artifacts/apex/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23095"
BASE_PATH = "/"
